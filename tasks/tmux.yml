- name: Installing tmux
  apt: name=tmux
  tags:
    - tmux
- name: Cloning .dotfiles
  ansible.builtin.git:
    repo: 'git@github.com:jimeh/tmuxifier.git'
    dest: "{{ lookup('env', 'HOME') }}/.tmuxifier"
    recursive: yes
    update: yes
    accept_hostkey: yes
    version: master
  tags:
    - tmux
